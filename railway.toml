# ── Railway Deployment Configuration ─────────────────────────────
# This file tells Railway how to build and run the Spring Boot app.

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "java -jar target/bfhl-api-1.0.0.jar"
healthcheckPath = "/bfhl"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
