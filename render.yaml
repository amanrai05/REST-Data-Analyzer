services:
  - type: web
    name: bfhl-api
    env: java
    plan: free
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/bfhl-api-1.0.0.jar
    healthCheckPath: /bfhl
    envVars:
      - key: JAVA_VERSION
        value: 17
      - key: SPRING_PROFILES_ACTIVE
        value: production
